<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IronForge Fitness | Tu Gimnasio</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        /* --- VARIABLES DE COLOR (Basado en ColorHunt) --- */
        :root {
            --color-fondo: #222831; /* Gris muy oscuro casi negro */
            --color-secundario: #393E46; /* Gris medio */
            --color-acento: #D65A31; /* Naranja vibrante */
            --color-texto: #EEEEEE; /* Blanco roto */
        }

        /* --- ESTILOS GENERALES --- */
        body {
            /* Fuente primaria: Oswald. Alternativa: sans-serif */
            font-family: 'Roboto', sans-serif; 
            background-color: var(--color-fondo);
            color: var(--color-texto);
        }

        h1, h2, h3, .fuente-titulos {
            font-family: 'Oswald', sans-serif;
            text-transform: uppercase;
        }

        /* --- HEADER Y NAVBAR --- */
        .navbar {
            background-color: var(--color-secundario);
            padding: 1rem 2rem;
        }

        /* Logotipo (Icono) y Nombre de marca separados pero con enlace a inicio */
        .navbar-brand-logo {
            color: var(--color-acento);
            font-size: 2rem;
            margin-right: 10px;
            text-decoration: none;
        }

        .navbar-brand-text {
            font-family: 'Oswald', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--color-texto);
            text-decoration: none;
            letter-spacing: 1px;
        }

        /* Enlaces del menú */
        .nav-link {
            color: var(--color-texto) !important;
            font-size: 1.1rem;
            margin-left: 15px;
            transition: all 0.3s ease;
        }

        /* Iconos dentro del menú */
        .nav-icono {
            margin-right: 5px;
            color: var(--color-texto);
            transition: color 0.3s ease; /* Transición suave para el cambio de color */
        }

        /* Requisito: Cambiar color del icono al pasar el ratón */
        .nav-link:hover .nav-icono {
            color: var(--color-acento);
        }
        
        .nav-link:hover {
            color: var(--color-acento) !important;
        }
    </style>
</head>

<body>

    <header>
        <nav class="navbar navbar-expand-lg navbar-dark" id="menu-principal">
            <div class="container-fluid">
                
                <a href="index.html" class="navbar-brand-logo">
                    <i class="fa-solid fa-dumbbell"></i>
                </a>
                
                <a href="index.html" class="navbar-brand-text">
                    IRONFORGE
                </a>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navegacionGym" aria-controls="navegacionGym" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse justify-content-end" id="navegacionGym">
                    <ul class="navbar-nav">
                        <li class="nav-item">
                            <a class="nav-link" href="#"><i class="fa-solid fa-house nav-icono"></i>Inicio</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#"><i class="fa-solid fa-fire nav-icono"></i>Instalaciones</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#"><i class="fa-solid fa-users nav-icono"></i>Clases</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#"><i class="fa-solid fa-envelope nav-icono"></i>Contacto</a>
                        </li>
                    </ul>
                </div>
                
            </div>
        </nav>
    </header>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
